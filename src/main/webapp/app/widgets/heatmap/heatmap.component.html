<ngx-charts-heat-map [scheme]="colorScheme" [results]="heatmapData" [legend]="showLegend" [gradient]="gradient"
    [customColors]="customColors" [xAxis]="showXAxis" [yAxis]="showYAxis" [showXAxisLabel]="showXAxisLabel"
    [showYAxisLabel]="showYAxisLabel" [xAxisLabel]="xAxisLabel" [yAxisLabel]="yAxisLabel" (select)="onSelect($event)">
</ngx-charts-heat-map>
