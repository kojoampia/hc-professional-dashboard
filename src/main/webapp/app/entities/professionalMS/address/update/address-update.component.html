<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-address-heading" data-cy="AddressCreateUpdateHeading"
        jhiTranslate="professionalDashboardApp.professionalMsAddress.home.createOrEditLabel">
        Create or edit a Address
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        @if (editForm.controls.id.value !== null) {
        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.id"
            for="field_id">Id</label>
          <input type="text" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id"
            [readonly]="true" />
        </div>
        }

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.digitalAddress"
            for="field_digitalAddress">Digital Address</label>
          <input type="text" class="form-control" name="digitalAddress" id="field_digitalAddress"
            data-cy="digitalAddress" formControlName="digitalAddress" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.streetAddress"
            for="field_streetAddress">Street Address</label>
          <input type="text" class="form-control" name="streetAddress" id="field_streetAddress" data-cy="streetAddress"
            formControlName="streetAddress" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.areaCode"
            for="field_areaCode">Area Code</label>
          <input type="text" class="form-control" name="areaCode" id="field_areaCode" data-cy="areaCode"
            formControlName="areaCode" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.town"
            for="field_town">Town</label>
          <input type="text" class="form-control" name="town" id="field_town" data-cy="town" formControlName="town" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.city"
            for="field_city">City</label>
          <input type="text" class="form-control" name="city" id="field_city" data-cy="city" formControlName="city" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.district"
            for="field_district">District</label>
          <input type="text" class="form-control" name="district" id="field_district" data-cy="district"
            formControlName="district" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.state"
            for="field_state">State</label>
          <input type="text" class="form-control" name="state" id="field_state" data-cy="state"
            formControlName="state" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.region"
            for="field_region">Region</label>
          <input type="text" class="form-control" name="region" id="field_region" data-cy="region"
            formControlName="region" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.country"
            for="field_country">Country</label>
          <input type="text" class="form-control" name="country" id="field_country" data-cy="country"
            formControlName="country" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.createdDate"
            for="field_createdDate">Created Date</label>
          <div class="input-group">
            <input id="field_createdDate" data-cy="createdDate" type="text" class="form-control" name="createdDate"
              ngbDatepicker #createdDateDp="ngbDatepicker" formControlName="createdDate" />
            <button type="button" class="btn btn-secondary" (click)="createdDateDp.toggle()">
              <fa-icon icon="calendar-alt"></fa-icon>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.modifiedDate"
            for="field_modifiedDate">Modified Date</label>
          <div class="input-group">
            <input id="field_modifiedDate" data-cy="modifiedDate" type="text" class="form-control" name="modifiedDate"
              ngbDatepicker #modifiedDateDp="ngbDatepicker" formControlName="modifiedDate" />
            <button type="button" class="btn btn-secondary" (click)="modifiedDateDp.toggle()">
              <fa-icon icon="calendar-alt"></fa-icon>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.createdBy"
            for="field_createdBy">Created By</label>
          <input type="text" class="form-control" name="createdBy" id="field_createdBy" data-cy="createdBy"
            formControlName="createdBy" />
        </div>

        <div class="mb-3">
          <label class="form-label" jhiTranslate="professionalDashboardApp.professionalMsAddress.modifiedBy"
            for="field_modifiedBy">Modified By</label>
          <input type="text" class="form-control" name="modifiedBy" id="field_modifiedBy" data-cy="modifiedBy"
            formControlName="modifiedBy" />
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary"
          (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
        </button>

        <button type="submit" id="save-entity" data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving" class="btn btn-primary">
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
