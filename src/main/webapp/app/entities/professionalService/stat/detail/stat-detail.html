<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (stat(); as statRef) {
    <div>
      <h2 data-cy="statDetailsHeading"><span hpdTranslate="professionalDashboardApp.professionalServiceStat.detail.title">Stat</span></h2>

      <hr />

      <hpd-alert-error />

      <hpd-alert />

      <dl class="row-md jh-entity-details">
        <dt><span hpdTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ statRef.id }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceStat.type">Type</span></dt>
        <dd>
          <span>{{ statRef.type }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceStat.name">Name</span></dt>
        <dd>
          <span>{{ statRef.name }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceStat.description">Description</span></dt>
        <dd>
          <span>{{ statRef.description }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceStat.value">Value</span></dt>
        <dd>
          <span>{{ statRef.value }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceStat.note">Note</span></dt>
        <dd>
          <span>{{ statRef.note }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceStat.createdDate">Created Date</span></dt>
        <dd>
          <span>{{ statRef.createdDate | formatMediumDate }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceStat.createdBy">Created By</span></dt>
        <dd>
          <span>{{ statRef.createdBy }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left" />&nbsp;<span hpdTranslate="entity.action.back">Back</span>
      </button>

      <button type="button" [routerLink]="['/stat', statRef.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt" />&nbsp;<span hpdTranslate="entity.action.edit">Edit</span>
      </button>
    </div>
    }
  </div>
</div>
