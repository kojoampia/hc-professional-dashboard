<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="hpd-address-heading"
        data-cy="AddressCreateUpdateHeading"
        hpdTranslate="professionalDashboardApp.professionalServiceAddress.home.createOrEditLabel"
      >
        Create or edit a Address
      </h2>

      <div>
        <hpd-alert-error />

        @if (editForm.controls.id.value !== null) {

        <div class="mb-3">
          <label class="form-label" for="field_id" hpdTranslate="professionalDashboardApp.professionalServiceAddress.id">Id</label>
          <input type="text" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_digitalAddress" hpdTranslate="professionalDashboardApp.professionalServiceAddress.digitalAddress"
            >Digital Address</label
          >
          <input
            type="text"
            class="form-control"
            name="digitalAddress"
            id="field_digitalAddress"
            data-cy="digitalAddress"
            formControlName="digitalAddress"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_streetAddress" hpdTranslate="professionalDashboardApp.professionalServiceAddress.streetAddress"
            >Street Address</label
          >
          <input
            type="text"
            class="form-control"
            name="streetAddress"
            id="field_streetAddress"
            data-cy="streetAddress"
            formControlName="streetAddress"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_areaCode" hpdTranslate="professionalDashboardApp.professionalServiceAddress.areaCode"
            >Area Code</label
          >
          <input type="text" class="form-control" name="areaCode" id="field_areaCode" data-cy="areaCode" formControlName="areaCode" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_town" hpdTranslate="professionalDashboardApp.professionalServiceAddress.town">Town</label>
          <input type="text" class="form-control" name="town" id="field_town" data-cy="town" formControlName="town" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_city" hpdTranslate="professionalDashboardApp.professionalServiceAddress.city">City</label>
          <input type="text" class="form-control" name="city" id="field_city" data-cy="city" formControlName="city" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_district" hpdTranslate="professionalDashboardApp.professionalServiceAddress.district"
            >District</label
          >
          <input type="text" class="form-control" name="district" id="field_district" data-cy="district" formControlName="district" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_state" hpdTranslate="professionalDashboardApp.professionalServiceAddress.state">State</label>
          <input type="text" class="form-control" name="state" id="field_state" data-cy="state" formControlName="state" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_region" hpdTranslate="professionalDashboardApp.professionalServiceAddress.region">Region</label>
          <input type="text" class="form-control" name="region" id="field_region" data-cy="region" formControlName="region" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_country" hpdTranslate="professionalDashboardApp.professionalServiceAddress.country"
            >Country</label
          >
          <input type="text" class="form-control" name="country" id="field_country" data-cy="country" formControlName="country" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_createdDate" hpdTranslate="professionalDashboardApp.professionalServiceAddress.createdDate"
            >Created Date</label
          >
          <div class="input-group">
            <input
              id="field_createdDate"
              data-cy="createdDate"
              type="text"
              class="form-control"
              name="createdDate"
              ngbDatepicker
              #createdDateDp="ngbDatepicker"
              formControlName="createdDate"
            />
            <button type="button" class="btn btn-secondary" (click)="createdDateDp.toggle()"><fa-icon icon="calendar-alt" /></button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_modifiedDate" hpdTranslate="professionalDashboardApp.professionalServiceAddress.modifiedDate"
            >Modified Date</label
          >
          <div class="input-group">
            <input
              id="field_modifiedDate"
              data-cy="modifiedDate"
              type="text"
              class="form-control"
              name="modifiedDate"
              ngbDatepicker
              #modifiedDateDp="ngbDatepicker"
              formControlName="modifiedDate"
            />
            <button type="button" class="btn btn-secondary" (click)="modifiedDateDp.toggle()"><fa-icon icon="calendar-alt" /></button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_createdBy" hpdTranslate="professionalDashboardApp.professionalServiceAddress.createdBy"
            >Created By</label
          >
          <input type="text" class="form-control" name="createdBy" id="field_createdBy" data-cy="createdBy" formControlName="createdBy" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_modifiedBy" hpdTranslate="professionalDashboardApp.professionalServiceAddress.modifiedBy"
            >Modified By</label
          >
          <input
            type="text"
            class="form-control"
            name="modifiedBy"
            id="field_modifiedBy"
            data-cy="modifiedBy"
            formControlName="modifiedBy"
          />
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban" />&nbsp;<span hpdTranslate="entity.action.cancel">Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving()"
          class="btn btn-primary"
        >
          <fa-icon icon="save" />&nbsp;<span hpdTranslate="entity.action.save">Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
