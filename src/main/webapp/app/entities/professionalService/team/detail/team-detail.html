<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (team(); as teamRef) {
    <div>
      <h2 data-cy="teamDetailsHeading"><span hpdTranslate="professionalDashboardApp.professionalServiceTeam.detail.title">Team</span></h2>

      <hr />

      <hpd-alert-error />

      <hpd-alert />

      <dl class="row-md jh-entity-details">
        <dt><span hpdTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ teamRef.id }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceTeam.name">Name</span></dt>
        <dd>
          <span>{{ teamRef.name }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceTeam.description">Description</span></dt>
        <dd>
          <span>{{ teamRef.description }}</span>
        </dd>
        <dt><span hpdTranslate="professionalDashboardApp.professionalServiceTeam.contact">Contact</span></dt>
        <dd>
          <span>{{ teamRef.contact }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left" />&nbsp;<span hpdTranslate="entity.action.back">Back</span>
      </button>

      <button type="button" [routerLink]="['/team', teamRef.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt" />&nbsp;<span hpdTranslate="entity.action.edit">Edit</span>
      </button>
    </div>
    }
  </div>
</div>
