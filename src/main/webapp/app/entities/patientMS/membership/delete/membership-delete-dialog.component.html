@if (membership) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(membership.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="membershipDeleteDialogHeading" hpdTranslate="entity.delete.title">Confirm delete operation</h4>

      <button type="button" class="btn-close" data-dismiss="modal" aria-hidden="true" (click)="cancel()">&times;</button>
    </div>

    <div class="modal-body">
      <hpd-alert-error></hpd-alert-error>
      <p
        id="hpd-delete-membership-heading"
        hpdTranslate="professionalDashboardApp.professionalMsMembership.delete.question"
        [translateValues]="{ id: membership.id }"
      >
        Are you sure you want to delete Membership {{ membership.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span hpdTranslate="entity.action.cancel">Cancel</span>
      </button>

      <button id="hpd-confirm-delete-membership" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span hpdTranslate="entity.action.delete">Delete</span>
      </button>
    </div>
  </form>
}
