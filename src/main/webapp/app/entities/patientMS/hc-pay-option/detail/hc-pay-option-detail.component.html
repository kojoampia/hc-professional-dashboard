<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (hCPayOption) {
      <div>
        <h2 data-cy="hCPayOptionDetailsHeading">
          <span hpdTranslate="professionalDashboardApp.professionalMsHCPayOption.detail.title">HC Pay Option</span>
        </h2>

        <hr />

        <hpd-alert-error></hpd-alert-error>

        <hpd-alert></hpd-alert>

        <dl class="row-md jh-entity-details">
          <dt><span hpdTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ hCPayOption.id }}</span>
          </dd>
          <dt><span hpdTranslate="professionalDashboardApp.professionalMsHCPayOption.type">Type</span></dt>
          <dd>
            <span>{{ hCPayOption.type }}</span>
          </dd>
          <dt><span hpdTranslate="professionalDashboardApp.professionalMsHCPayOption.userID">User ID</span></dt>
          <dd>
            <span>{{ hCPayOption.userID }}</span>
          </dd>
          <dt><span hpdTranslate="professionalDashboardApp.professionalMsHCPayOption.metadata">Metadata</span></dt>
          <dd>
            <span>{{ hCPayOption.metadata }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span hpdTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/hc-pay-option', hCPayOption.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span hpdTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
